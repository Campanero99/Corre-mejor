<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Besser Laufen</title>
<link rel="icon" type="image/png" sizes="180x180" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // Iconos SVG
    const Activity = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    );
    
    const Heart = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    );
    
    const Trophy = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
    );
    
    const Target = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="6"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
    );
    
    const TrendingUp = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
    );
    
    const Clock = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    );
    
    const Zap = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );

    const BesserLaufen = () => {
      const [activeTab, setActiveTab] = React.useState('hf');
      const [hfMax, setHfMax] = React.useState('');
      const [alter, setAlter] = React.useState('');
      const [zeit10k, setZeit10k] = React.useState({ min: '', sek: '' });
      const [zeitMarathon, setZeitMarathon] = React.useState({ h: '', min: '' });
      const [zielDistanz, setZielDistanz] = React.useState('10k');

      const berechneHfZonen = () => {
        const hf = parseInt(hfMax);
        if (!hf || hf < 100 || hf > 220) return null;
        return {
          erholung: { min: Math.round(hf * 0.50), max: Math.round(hf * 0.67) },
          zone1: { min: Math.round(hf * 0.68), max: Math.round(hf * 0.72) },
          zone2: { min: Math.round(hf * 0.77), max: Math.round(hf * 0.79) },
          zone3: { min: Math.round(hf * 0.80), max: Math.round(hf * 0.84) },
          zone4: { min: Math.round(hf * 0.85), max: Math.round(hf * 0.88) },
          wettkampf: { min: Math.round(hf * 0.89), max: Math.round(hf * 0.92) }
        };
      };

      const zeitZuSekunden = (h, min, sek) => (h || 0) * 3600 + (min || 0) * 60 + (sek || 0);

      const sekundenZuFormat = (totalSek) => {
        const h = Math.floor(totalSek / 3600);
        const min = Math.floor((totalSek % 3600) / 60);
        const sek = Math.round(totalSek % 60);
        if (h > 0) return `${h}:${min.toString().padStart(2, '0')}:${sek.toString().padStart(2, '0')}`;
        return `${min}:${sek.toString().padStart(2, '0')}`;
      };

      const sekundenZuMinKm = (sekProKm) => {
        const min = Math.floor(sekProKm / 60);
        const sek = Math.round(sekProKm % 60);
        return `${min}:${sek.toString().padStart(2, '0')}`;
      };

      const vorhersageZeiten = (von, zeit) => {
        const sek = zeit;
        let zeiten = {};
        if (von === '10k') {
          zeiten['10k'] = sek;
          zeiten['21k'] = Math.round(sek * 2.182);
          zeiten['42k'] = Math.round(sek * 4.7);
        } else if (von === '42k') {
          zeiten['42k'] = sek;
          zeiten['21k'] = Math.round(sek / 2.154);
          zeiten['10k'] = Math.round(sek / 4.7);
        }
        return zeiten;
      };

      const berechneTempos = () => {
        let tempoMarathon, tempo10k;
        if (zeit10k.min) {
          const sek10k = zeitZuSekunden(0, parseInt(zeit10k.min), parseInt(zeit10k.sek || 0));
          const zeiten = vorhersageZeiten('10k', sek10k);
          tempoMarathon = zeiten['42k'] / 42.195;
          tempo10k = sek10k / 10;
        } else if (zeitMarathon.h || zeitMarathon.min) {
          const sekMarathon = zeitZuSekunden(parseInt(zeitMarathon.h || 0), parseInt(zeitMarathon.min || 0), 0);
          const zeiten = vorhersageZeiten('42k', sekMarathon);
          tempoMarathon = sekMarathon / 42.195;
          tempo10k = zeiten['10k'] / 10;
        } else return null;

        return {
          lockererLauf: { min: tempoMarathon + 60, max: tempoMarathon + 75 },
          rennTempo: {
            km: zielDistanz === '10k' ? '5–6 km' : '5–15 km',
            tempo: zielDistanz === '10k' ? tempo10k : tempoMarathon
          },
          intensiverLauf: {
            tempoMin: zielDistanz === '10k' ? tempo10k + 20 : tempoMarathon + 15,
            tempoMax: zielDistanz === '10k' ? tempo10k + 30 : tempoMarathon + 20,
            distanz: zielDistanz === '10k' ? '8–12 km' : '12–15 km'
          },
          langerLaufBasic: {
            dauer: '1:45–2:00 Std.',
            beschreibung: 'Das ganze Jahr über, wenn du kein Marathonläufer bist',
            tempoMin: tempo10k + 90,
            tempoMax: tempo10k + 105
          },
          langerLaufMarathon: {
            dauer: '2:15–3:00 Std.',
            beschreibung: 'Jede Woche um 10–15 Min. steigern',
            tempoMin: tempoMarathon + 60,
            tempoMax: tempoMarathon + 75
          }
        };
      };

      const hfZonen = berechneHfZonen();
      const tempos = berechneTempos();

      const holeVorhersagen = () => {
        if (zeit10k.min) {
          const sek10k = zeitZuSekunden(0, parseInt(zeit10k.min), parseInt(zeit10k.sek || 0));
          return vorhersageZeiten('10k', sek10k);
        } else if (zeitMarathon.h || zeitMarathon.min) {
          const sekMarathon = zeitZuSekunden(parseInt(zeitMarathon.h || 0), parseInt(zeitMarathon.min || 0), 0);
          return vorhersageZeiten('42k', sekMarathon);
        }
        return null;
      };

      const vorhersagen = holeVorhersagen();

      const getNiveau = () => {
        if (!vorhersagen) return null;
        const marathonStunden = vorhersagen['42k'] / 3600;
        if (marathonStunden < 2.433) return 'elite';
        if (marathonStunden < 3.083) return 'fortgeschritten';
        if (marathonStunden < 3.667) return 'mittel';
        return 'anfänger';
      };

      const niveau = getNiveau();
      const empfehlungen = {
        elite: { kmWoche: '120–160 km', qualitätsTage: '3–4 Tage' },
        fortgeschritten: { kmWoche: '90–120 km', qualitätsTage: '2–3 Tage' },
        mittel: { kmWoche: '60–90 km', qualitätsTage: '2 Tage' },
        anfänger: { kmWoche: '60–80 km', qualitätsTage: '1–2 Tage' }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <div className="max-w-6xl mx-auto">
            <div className="bg-white rounded-2xl shadow-xl p-8 mb-6">
              <div className="flex items-center justify-center gap-3 mb-4">
                <Activity className="w-12 h-12 text-indigo-600" />
                <h1 className="text-4xl font-bold text-gray-800">Besser Laufen</h1>
              </div>
              <p className="text-center text-gray-600 text-lg">
                Professionelles Lauftraining auf der Grundlage von Elite-Erfahrung (Persönliche Bestzeit: 2:19 h Marathon)
              </p>
            </div>

            <div className="bg-white rounded-2xl shadow-xl mb-6 p-2">
              <div className="flex gap-2 flex-wrap">
                {[
                  { id: 'hf', icon: <Heart className="w-5 h-5 inline mr-2" />, label: 'HF-Zonen' },
                  { id: 'zeiten', icon: <Trophy className="w-5 h-5 inline mr-2" />, label: 'Prognose' },
                  { id: 'tempos', icon: <Target className="w-5 h-5 inline mr-2" />, label: 'Tempos' },
                  { id: 'empfehlungen', icon: <TrendingUp className="w-5 h-5 inline mr-2" />, label: 'Empfehlungen' },
                ].map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 min-w-[140px] py-3 px-4 rounded-xl font-semibold transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                    {tab.icon}{tab.label}
                  </button>
                ))}
              </div>
            </div>

            {activeTab === 'hf' && (
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-1xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                  <Heart className="w-7 h-7 text-red-500" />
                  Herzfrequenz-Zonen
                </h2>

                <div className="mb-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded">
                  <p className="text-yellow-800 font-semibold">
                    💡 Empfehlung: Führe einen Belastungstest durch, um deine tatsächliche maximale Herzfrequenz zu kennen. Das ist genauer als geschätzte Formeln.
                  </p>
                </div>

                <div className="grid md:grid-cols-2 gap-6 mb-6">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Maximale HF (gemessen oder aus einem Test)</label>
                    <input type="number" value={hfMax} onChange={e => setHfMax(e.target.value)} placeholder="z. B. 185"
                      className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Alter (optional, zur Orientierung)</label>
                    <input type="number" value={alter} onChange={e => setAlter(e.target.value)} placeholder="z. B. 35"
                      className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                    {alter && (
                      <p className="text-sm text-gray-500 mt-1">Geschätzte max. HF (220 − Alter): {220 - parseInt(alter)} Bpm</p>
                    )}
                  </div>
                </div>

                {hfZonen && (
                  <div className="space-y-3">
                    <h3 className="text-xl font-bold text-gray-800 mb-4">Deine Trainingszonen:</h3>
 {[
  { label: 'Erholung', percent: '(<67%)', range: `< ${hfZonen.erholung.max} ppm`, colors: 'from-green-50 to-green-100 border-green-300 text-green-800' },
  { label: 'Zone 1', percent: '(68-72%)', range: `${hfZonen.zone1.min}-${hfZonen.zone1.max} ppm`, colors: 'from-blue-50 to-blue-100 border-blue-300 text-blue-800' },
  { label: 'Zone 2', percent: '(77-79%)', range: `${hfZonen.zone2.min}-${hfZonen.zone2.max} ppm`, colors: 'from-cyan-50 to-cyan-100 border-cyan-300 text-cyan-800' },
  { label: 'Zone 3', percent: '(80-84%)', range: `${hfZonen.zone3.min}-${hfZonen.zone3.max} Bpm`, colors: 'from-orange-50 to-orange-100 border-orange-300 text-orange-800' },
  { label: 'Zone 4', percent: '(85-88%)', range: `${hfZonen.zone4.min}-${hfZonen.zone4.max} ppm`, colors: 'from-red-50 to-red-100 border-red-300 text-red-800' },
  { label: 'Wettkampftempo', percent: '(89-92%)', range: `${hfZonen.wettkampf.min}-${hfZonen.wettkampf.max} ppm`, colors: 'from-purple-50 to-purple-100 border-purple-300 text-purple-800' },
].map(z => {
  const [c1,c2,c3,c4] = z.colors.split(' ');
  return (
    <div key={z.label} className={`bg-gradient-to-r ${c1} ${c2} p-4 rounded-xl border-2 ${c3}`}>
      <p className={`font-bold ${c4} mb-2`}>{z.label} {z.percent}</p>
      <p className={`text-2xl font-bold ${c4} text-right`}>{z.range}</p>
    </div>
  );
})}
                  </div>
                )}

                {hfZonen && (
                  <div className="mt-8">
                    <h3 className="text-xl font-bold text-gray-800 mb-4">Vollständige Herzfrequenztabelle:</h3>
                    <div className="bg-white border-2 border-gray-200 rounded-xl overflow-hidden">
                      <div className="grid grid-cols-2 bg-blue-600 text-white font-bold p-3">
                        <div className="text-center text-sm">Intensität</div>
                        <div className="text-center text-sm">Herzfrequenz</div>
                      </div>
                      <div className="max-h-96 overflow-y-auto">
                        {Array.from({ length: 36 }, (_, i) => {
                          const prozent = 65 + i;
                          const frequenz = Math.round(parseInt(hfMax) * (prozent / 100));
                          return (
                            <div key={prozent} className={`grid grid-cols-2 p-3 border-b border-gray-200 ${i % 2 === 0 ? 'bg-gray-50' : 'bg-white'}`}>
                              <div className="text-center text-blue-700 font-bold text-base">{prozent} %</div>
                              <div className="text-center text-blue-900 font-bold text-base">{frequenz}</div>
                            </div>
                          );
                        })}
                        <div className="grid grid-cols-2 p-3 bg-blue-100 border-t-2 border-blue-300">
                          <div className="text-center text-blue-800 font-bold text-base">Max %</div>
                          <div className="text-center text-blue-900 font-bold text-base">{hfMax}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'zeiten' && (
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                  <Trophy className="w-7 h-7 text-yellow-500" />
                  Zeitenprognose
                </h2>

                <div className="mb-6 bg-blue-50 border-l-4 border-blue-400 p-4 rounded">
                  <p className="text-blue-800">
                    <strong>Gib deine Bestzeit ein</strong> über 10 km oder Marathon, um deine Zeiten für andere Distanzen vorherzusagen.
                  </p>
                </div>

                <div className="grid md:grid-cols-2 gap-8 mb-6">
                  <div className="bg-gray-50 p-6 rounded-xl">
                    <h3 className="font-bold text-base text-gray-800 mb-4">Deine 10-km-Zeit</h3>
                    <div className="flex gap-3">
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Minuten</label>
                        <input type="number" value={zeit10k.min}
                          onChange={e => { setZeit10k({ ...zeit10k, min: e.target.value }); setZeitMarathon({ h: '', min: '' }); }}
                          placeholder="40" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Sekunden</label>
                        <input type="number" value={zeit10k.sek} onChange={e => setZeit10k({ ...zeit10k, sek: e.target.value })}
                          placeholder="00" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                    </div>
                  </div>

                  <div className="bg-gray-50 p-6 rounded-xl">
                    <h3 className="font-bold text-base text-gray-800 mb-4">Deine Marathon-Zeit</h3>
                    <div className="flex gap-3">
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Stunden</label>
                        <input type="number" value={zeitMarathon.h}
                          onChange={e => { setZeitMarathon({ ...zeitMarathon, h: e.target.value }); setZeit10k({ min: '', sek: '' }); }}
                          placeholder="3" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Minuten</label>
                        <input type="number" value={zeitMarathon.min} onChange={e => setZeitMarathon({ ...zeitMarathon, min: e.target.value })}
                          placeholder="30" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                    </div>
                  </div>
                </div>

                {vorhersagen && (
                  <div>
                    <h3 className="text-xl font-bold text-gray-800 mb-4">Deine vorhergesagten Zeiten:</h3>
                    <div className="grid md:grid-cols-3 gap-4">
                      {[
                        { label: '10 Kilometer', key: '10k', dist: 10, color: 'from-green-500 to-green-600' },
                        { label: 'Halbmarathon', key: '21k', dist: 21.097, color: 'from-blue-500 to-blue-600' },
                        { label: 'Marathon', key: '42k', dist: 42.195, color: 'from-purple-500 to-purple-600' },
                      ].map(d => (
                        <div key={d.key} className={`bg-gradient-to-br ${d.color} p-6 rounded-xl text-white shadow-lg`}>
                          <p className="text-sm font-semibold mb-2 opacity-90">{d.label}</p>
                          <p className="text-4xl font-bold mb-2">{sekundenZuFormat(vorhersagen[d.key])}</p>
                          <p className="text-lg opacity-90">Tempo: {sekundenZuMinKm(vorhersagen[d.key] / d.dist)} min/km</p>
                        </div>
                      ))}
                    </div>

                    {niveau && (
                      <div className="mt-6 bg-indigo-50 border-2 border-indigo-300 p-6 rounded-xl">
                        <h4 className="font-bold text-indigo-900 text-lg mb-3 flex items-center gap-2">
                          <TrendingUp className="w-5 h-5" />
                          Empfehlungen für dein Niveau ({niveau.charAt(0).toUpperCase() + niveau.slice(1)})
                        </h4>
                        <div className="grid md:grid-cols-2 gap-4">
                          <div className="bg-white p-4 rounded-lg">
                            <p className="text-sm text-gray-600 mb-1">Kilometer pro Woche</p>
                            <p className="text-2xl font-bold text-indigo-600">{empfehlungen[niveau].kmWoche}</p>
                          </div>
                          <div className="bg-white p-4 rounded-lg">
                            <p className="text-sm text-gray-600 mb-1">Qualitätstage</p>
                            <p className="text-2xl font-bold text-indigo-600">{empfehlungen[niveau].qualitätsTage}</p>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'tempos' && (
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                  <Target className="w-7 h-7 text-indigo-500" />
                  Trainingstempos
                </h2>

                <div className="mb-6 bg-indigo-50 border-l-4 border-indigo-400 p-4 rounded">
                  <p className="text-indigo-800">
                    <strong>Gib deine Zeit ein</strong> und wähle dein Ziel, um personalisierte Tempos zu erhalten.
                  </p>
                </div>

                <div className="grid md:grid-cols-2 gap-6 mb-6">
                  <div className="bg-gray-50 p-6 rounded-xl">
                    <h3 className="font-bold text-lg text-gray-800 mb-4">Deine 10-km-Zeit</h3>
                    <div className="flex gap-3">
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Minuten</label>
                        <input type="number" value={zeit10k.min}
                          onChange={e => { setZeit10k({ ...zeit10k, min: e.target.value }); setZeitMarathon({ h: '', min: '' }); }}
                          placeholder="40" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Sekunden</label>
                        <input type="number" value={zeit10k.sek} onChange={e => setZeit10k({ ...zeit10k, sek: e.target.value })}
                          placeholder="00" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                    </div>
                  </div>

                  <div className="bg-gray-50 p-6 rounded-xl">
                    <h3 className="font-bold text-lg text-gray-800 mb-4">Oder deine Marathon-Zeit</h3>
                    <div className="flex gap-3">
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Stunden</label>
                        <input type="number" value={zeitMarathon.h}
                          onChange={e => { setZeitMarathon({ ...zeitMarathon, h: e.target.value }); setZeit10k({ min: '', sek: '' }); }}
                          placeholder="3" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">Minuten</label>
                        <input type="number" value={zeitMarathon.min} onChange={e => setZeitMarathon({ ...zeitMarathon, min: e.target.value })}
                          placeholder="30" className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      </div>
                    </div>
                  </div>
                </div>

                <div className="mb-6">
                  <label className="block text-sm font-semibold text-gray-700 mb-3">Worauf bereitest du dich vor?</label>
                  <div className="flex gap-3">
                    {[['10k','10 Kilometer'],['maraton','Marathon']].map(([val,lbl]) => (
                      <button key={val} onClick={() => setZielDistanz(val)}
                        className={`flex-1 py-3 px-6 rounded-xl font-semibold transition-all ${zielDistanz === val ? 'bg-indigo-600 text-white shadow-lg' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                        {lbl}
                      </button>
                    ))}
                  </div>
                </div>

                {tempos && (
                  <div className="space-y-4">
                    <h3 className="text-xl font-bold text-gray-800 mb-4">Deine Trainingstempos:</h3>

                    <div className="bg-gradient-to-r from-green-50 to-green-100 p-5 rounded-xl border-2 border-green-300">
                      <div className="flex items-center gap-3 mb-2">
                        <Clock className="w-6 h-6 text-green-700" />
                        <h4 className="font-bold text-green-900 text-lg">Lockerer Lauf</h4>
                      </div>
                      <p className="text-sm text-green-700 mb-2">Aerobe Basis – 70–80 % deines Trainings</p>
                      <p className="text-3xl font-bold text-green-800">
                        {sekundenZuMinKm(tempos.lockererLauf.min)} – {sekundenZuMinKm(tempos.lockererLauf.max)} min/km
                      </p>
                    </div>

                    <div className="bg-gradient-to-r from-orange-50 to-orange-100 p-5 rounded-xl border-2 border-orange-300">
                      <div className="flex items-center gap-3 mb-2">
                        <Zap className="w-6 h-6 text-orange-700" />
                        <h4 className="font-bold text-orange-900 text-lg">Renntempo</h4>
                      </div>
                      <p className="text-sm text-orange-700 mb-2">Lauf über {tempos.rennTempo.km}</p>
                      <p className="text-3xl font-bold text-orange-800">{sekundenZuMinKm(tempos.rennTempo.tempo)} min/km</p>
                    </div>

                    <div className="bg-gradient-to-r from-red-50 to-red-100 p-5 rounded-xl border-2 border-red-300">
                      <div className="flex items-center gap-3 mb-2">
                        <Target className="w-6 h-6 text-red-700" />
                        <h4 className="font-bold text-red-900 text-lg">Intensiver Lauf</h4>
                      </div>
                      <p className="text-sm text-red-700 mb-2">Distanz: {tempos.intensiverLauf.distanz}</p>
                      <p className="text-3xl font-bold text-red-800">
                        {sekundenZuMinKm(tempos.intensiverLauf.tempoMin)} – {sekundenZuMinKm(tempos.intensiverLauf.tempoMax)} min/km
                      </p>
                    </div>

                    <div className="bg-gradient-to-r from-blue-50 to-blue-100 p-5 rounded-xl border-2 border-blue-300">
                      <div className="flex items-center gap-3 mb-2">
                        <Activity className="w-6 h-6 text-blue-700" />
                        <h4 className="font-bold text-blue-900 text-lg">Langer Lauf (Grundlage)</h4>
                      </div>
                      <p className="text-sm text-blue-700 mb-1">{tempos.langerLaufBasic.dauer}</p>
                      <p className="text-sm text-blue-600 italic mb-2">{tempos.langerLaufBasic.beschreibung}</p>
                      <p className="text-2xl font-bold text-blue-800">
                        {sekundenZuMinKm(tempos.langerLaufBasic.tempoMin)} – {sekundenZuMinKm(tempos.langerLaufBasic.tempoMax)} min/km
                      </p>
                    </div>

                    <div className="bg-gradient-to-r from-indigo-50 to-indigo-100 p-5 rounded-xl border-2 border-indigo-300">
                      <div className="flex items-center gap-3 mb-2">
                        <Activity className="w-6 h-6 text-indigo-700" />
                        <h4 className="font-bold text-indigo-900 text-lg">Langer Lauf für den Marathon</h4>
                      </div>
                      <p className="text-sm text-indigo-700 mb-1">{tempos.langerLaufMarathon.dauer}</p>
                      <p className="text-sm text-indigo-600 italic mb-2">{tempos.langerLaufMarathon.beschreibung}</p>
                      <p className="text-2xl font-bold text-indigo-800">
                        {sekundenZuMinKm(tempos.langerLaufMarathon.tempoMin)} – {sekundenZuMinKm(tempos.langerLaufMarathon.tempoMax)} min/km
                      </p>
                    </div>

                    <div className="mt-6 bg-gray-50 p-5 rounded-xl border-2 border-gray-200">
                      <h4 className="font-bold text-gray-800 mb-3">📋 Trainingstipps:</h4>
                      <ul className="space-y-2 text-gray-700">
                        <li>• Der größte Teil der Kilometer sollte in lockerem Tempo absolviert werden.</li>
                        <li>• 1–2 Qualitätseinheiten pro Woche einplanen.</li>
                        <li>• Ausreichend zwischen den harten Einheiten erholen.</li>
                        <li>• Den Umfang schrittweise steigern (10-Prozent-Regel).</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'empfehlungen' && (
              <div className="bg-white rounded-2xl shadow-xl p-4 md:p-8">
                <h2 className="text-xl md:text-3xl font-bold text-gray-800 mb-3 md:mb-4 text-center">
                  Überlegungen und Empfehlungen zur Marathon-Vorbereitung
                </h2>
                <p className="text-center text-base md:text-lg text-indigo-600 font-semibold mb-6 md:mb-8">
   
                </p>

                <div className="bg-gradient-to-r from-indigo-50 to-blue-50 p-4 md:p-6 rounded-xl mb-6 md:mb-8 border-l-4 border-indigo-500">
                  <p className="text-sm md:text-base text-gray-700 leading-relaxed italic">
                    Einen Marathon zu laufen bedeutet nicht nur, 42,195 Kilometer zurückzulegen: Es ist ein physiologischer, mentaler und emotionaler Transformationsprozess, der bei jedem, der ihn erlebt, tiefe Spuren hinterlässt. In über 45 Jahren Laufsport, mit 28 absolvierten Marathons und einer persönlichen Bestzeit unter 2:19 h, habe ich gelernt, dass der Erfolg auf dieser Distanz aus der genauen Kombination von Wissenschaft, Beständigkeit und Leidenschaft entsteht. Diese Zeilen enthalten technische und persönliche Überlegungen, die dir helfen sollen, deinen Marathon mit Verstand, Herz und Respekt vor der Distanz vorzubereiten.
                  </p>
                </div>

                <div className="space-y-4 md:space-y-6 max-h-[500px] md:max-h-[600px] overflow-y-auto pr-2 md:pr-4">
                  {[
                    {
                      n: '1', title: 'Die Entscheidung: Warum ein Marathon?',
                      text: 'Der Marathon liegt im Trend, ist aber keine bloße Mode. Er ist eine ernsthafte Entscheidung, die sportliche Reife erfordert. Bevor man ihn in Angriff nimmt, ist es ratsam, mindestens zwei Jahre regelmäßig zu laufen und an 10-km- und Halbmarathon-Wettkämpfen teilgenommen zu haben. Die Vorbereitung auf einen Marathon bedeutet, sein Leben neu zu organisieren: Zeitpläne, Erholung, Ernährung und Prioritäten. Es ist kein Verzicht, sondern eine emotionale Investition in einen Traum, der dich als Läufer und als Mensch wachsen lässt.'
                    },
                    {
                      n: '2', title: 'Gesundheit: Die Grundlage der Leistung',
                      text: 'Bevor du mit der Vorbereitung beginnst, lass eine vollständige ärztliche Untersuchung durchführen. Ein Elektrokardiogramm, ein Belastungstest und ein Basislabor sind unverzichtbare Grundlagen für ein sicheres Training. Gesundheit ist nicht verhandelbar: Ohne sie gibt es keine Leistung, keinen Genuss und keinen Marathon.'
                    },
                    {
                      n: '3', title: 'Planung: Wochen und Struktur',
                      text: '8 bis 11 Wochen spezifisches Training reichen in der Regel aus, wenn eine gute Grundlage vorhanden ist. Der Schlüssel liegt in der Progression: Umfang und Intensität kontrolliert steigern und dabei die Prinzipien von Belastung, Erholung und Anpassung beachten.'
                    },
                    {
                      n: '4', title: 'Trainingsumgebung: Ort und Gemeinschaft',
                      text: 'Trainiere auf vertrauten Strecken in der Nähe deines Zuhauses, die Logistik und Kontrolle des Trainings erleichtern. Trainiere wann immer möglich in Begleitung: Die Gruppe gibt an schwierigen Tagen Halt und vervielfacht die Motivation. Der Marathon wird allein gelaufen, aber besser im Team vorbereitet.'
                    },
                    {
                      n: '5', title: 'Realistisches Ziel: Viel mehr als eine Zeit',
                      text: 'Beim ersten Marathon ist das Hauptziel, stark und unverletzt ins Ziel zu kommen. Die Zeit ergibt sich als Folge guter Arbeit. Die Ziellinie zum ersten Mal zu überqueren ist eine kaum zu beschreibende emotionale Erfahrung: Tränen, Stolz, innere Stille und die tiefe Gewissheit, alles gegeben zu haben.'
                    },
                    {
                      n: '6', title: 'Trainingsmethodik',
                      text: 'Kombiniere drei grundlegende Säulen: aerobes Volumen (lockere und lange Läufe) zum Aufbau der physiologischen Basis; Marathontempo zur Optimierung der Laufökonomie und Gewöhnung an die spezifische Belastung; sowie Qualitätsarbeit (Tempowechsel, intensive Läufe, Steigerungen, Berge) zur Verbesserung der VO₂max und der aeroben Schwelle.'
                    },
                    {
                      n: '7', title: 'Tempos und Wochenumfang',
                      text: 'Hobbyläufer sollten zwischen 60 und 70 km pro Woche laufen, angepasst an ihr Niveau. Die Tempos sollten überwiegend aerob sein (Zone 2–3), denn dort wird die eigentliche Ausdauer aufgebaut. Langsam zu trainieren ist keine Zeitverschwendung – es ist eine Investition in die Zukunft.'
                    },
                    {
                      n: '8', title: 'Intensitätskontrolle: Pulsmesser und Körpergefühl',
                      text: 'Die eigene maximale Herzfrequenz und aerobe Schwelle zu kennen, ermöglicht präzises Training. Technologie ist hilfreich, aber vergiss nicht, auf deinen Körper zu hören: Müdigkeit, Erholung und Stimmung sind ebenfalls wertvolle Daten.'
                    },
                    {
                      n: '9', title: 'Der lange Lauf: Das Labor des Marathonläufers',
                      text: 'Der lange Lauf ist die wichtigste Trainingseinheit. Führe ihn sonntags frühmorgens durch und simuliere dabei den Wettkampf. Hier werden Stoffwechsel, Geist und Geduld trainiert.'
                    },
                    {
                      n: '10', title: 'Zeit statt Kilometer',
                      text: 'Für die meisten Läufer ist Training nach Zeit effektiver: 2:15–3:00 Stunden kontinuierliches Laufen fördert die gewünschten Anpassungen besser als eine starre Kilometerzahl.'
                    },
                    {
                      n: '11', title: 'Metabolische Anpassung: Nüchterntraining',
                      text: 'Den langen Lauf nüchtern zu absolvieren – bei 70–72 % der maximalen HF – verbessert die Fettverbrennung und schont die Glykogenspeicher. Dieser Prozess ist entscheidend, um die gefürchtete „Mauer bei km 30" zu vermeiden. Es ist physiologisches Training … und auch eine Übung im Vertrauen auf den eigenen Körper.'
                    },
                    {
                      n: '12', title: 'Erholung: Wiederaufbau für weiteres Wachstum',
                      text: 'Ohne Erholung findet keine Anpassung statt. Nach dem langen Lauf Kohlenhydrate und hochwertige Proteine auffüllen: Haferflocken, reifes Obst, gekochte Kartoffeln, Vollkornreis. Jede Mahlzeit ist eine Gelegenheit, Körper und Motivation wieder aufzubauen.'
                    },
                    {
                      n: '13', title: 'Bewusste Ernährung',
                      text: 'Eine Ernährung auf Basis echter Lebensmittel – Gemüse, Obst, Hülsenfrüchte, Vollkorngetreide und native Öle – ist die beste natürliche ergogene Unterstützung. Industriellen Zucker reduzieren: weniger Blutzuckerspitzen, mehr Energie- und emotionale Stabilität.'
                    },
                    {
                      n: '14', title: 'Mahlzeitenfrequenz und metabolische Effizienz',
                      text: '2–3 Mahlzeiten pro Tag fördern die metabolische Flexibilität, verbessern die Fettverbrennung und entlasten das Verdauungssystem. Ein gut ausgeruhtes Verdauungssystem stellt mehr Energie für Training und Erholung bereit.'
                    },
                    {
                      n: '15', title: 'Wettkampftempo: Vertrauen aufbauen',
                      text: 'Trainiere einmal pro Woche im Marathontempo. Beginne mit 5 km und steigere dich auf 12–15 km. Du trainierst nicht nur den Körper – du trainierst auch die Gewissheit, dass du dieses Tempo halten kannst, wenn es darauf ankommt.'
                    },
                    {
                      n: '16', title: 'Wettkämpfe als physiologischer und emotionaler Test',
                      text: '10–15 km im Marathontempo oder einen Halbmarathon vier Wochen vor dem Rennen zu laufen, ist ein ausgezeichneter Test. Er dient dazu, die Form zu überprüfen, Material zu testen und sich zu vergewissern, dass der Traum erreichbar ist.'
                    },
                    {
                      n: '17', title: 'Alternative Methode: Wirksame Einfachheit',
                      text: '2–3-mal pro Woche 70–80 Minuten zu laufen, 20–25 Sekunden langsamer als das Marathontempo, baut eine solide und tiefe Ausdauer auf. Es ist anspruchsvoll, unauffällig und äußerst wirksam.'
                    },
                    {
                      n: '18', title: 'Schuhe: Vertrauen unter den Füßen',
                      text: 'Die Schuhe sollten eine Verlängerung des eigenen Körpers sein. Sie werden am Wettkampftag niemals zum ersten Mal getragen. Verwende sie während der gesamten Vorbereitung bei Tempoläufen: Auch Vertrauen will trainiert sein.'
                    },
                    {
                      n: '19', title: 'Der Wettkampftag: Wissenschaft und Emotion',
                      text: 'Frühstücke das Bewährte: Kamillentee mit Honig, Weißbrot mit Butter und Honig sowie eine reife Banane – drei Stunden vor dem Start. Ein lockeres Einlaufen, progressives Aufwärmen, ruhiges Atmen. Und dann, an der Startlinie, wirst du verstehen, dass sich alles gelohnt hat: jeder trainierte Kilometer, jeder überwundene Zweifel, jedes frühe Aufstehen. Der Marathon wird nicht nur mit den Beinen gelaufen – er wird mit dem Kopf gelaufen … und mit dem Herzen.'
                    },
                  ].map(p => (
                    <div key={p.n} className="bg-white border-2 border-gray-200 rounded-xl p-4 md:p-6 hover:shadow-lg transition-shadow">
                      <h3 className="text-base md:text-lg font-bold text-indigo-700 mb-2 md:mb-3 leading-snug">{p.n}. {p.title}</h3>
                      <p className="text-sm md:text-base text-gray-700 leading-relaxed">{p.text}</p>
                    </div>
                  ))}

                  <div className="bg-gradient-to-r from-amber-50 to-yellow-50 p-4 md:p-8 rounded-xl border-2 border-amber-300">
                    <h3 className="text-xl md:text-2xl font-bold text-amber-900 mb-3 md:mb-4 text-center">Epilog</h3>
                    <p className="text-sm md:text-base text-gray-700 leading-relaxed text-center">
                      Diese Überlegungen entstammen einem dem Laufsport gewidmeten Leben und dem Glück, Erfahrungen mit großartigen Athleten wie Waldemar Cierpinski, Andrés Espinosa oder Julio Rey geteilt zu haben. Von ihnen habe ich gelernt, dass der Marathon ein physiologisches und emotionales Kunstwerk ist: Präzision, Bescheidenheit und Leidenschaft.
                    </p>
                    <p className="text-sm md:text-base text-gray-700 leading-relaxed text-center mt-3 md:mt-4 font-semibold">
                      Wenn diese Zeilen dich bei deiner Vorbereitung begleiten, ist das Ziel bereits erreicht.
                    </p>
                    <p className="text-center text-lg md:text-xl font-bold text-indigo-700 mt-4 md:mt-6">
                      Manolo „El Campanero"
                    </p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<BesserLaufen />, document.getElementById('root'));
  </script>
</body>
</html>
